{% load static %}
<!DOCTYPE html>
<html lang="zxx">
<head>
    <!-- Basic Page Needs -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Furnitica - Minimalist Furniture HTML Template</title>

    <meta name="keywords" content="Furniture, Decor, Interior">
    <meta name="description" content="Furnitica - Minimalist Furniture HTML Template">
    <meta name="author" content="tivatheme">

    <!-- Mobile Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700" rel="stylesheet">

    <!-- Vendor CSS -->
    <link rel="stylesheet" href="{% static 'assets/libs/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/font-awesome/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/font-material/css/material-design-iconic-font.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/slider-range/css/jslider.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/nivo-slider/css/nivo-slider.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/nivo-slider/css/animate.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/nivo-slider/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/owl-carousel/assets/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/slick-slider/css/slick.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/slick-slider/css/slick-theme.css' %}">

    <!-- Template CSS -->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/reponsive.css' %}">
</head>

<body id="product-detail">
    {% include 'inc/_header.html' %}

    <!-- main content -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- footer -->
    {% include 'inc/_footer.html' %}

    <!-- back top-top -->
    <div class="back-to-top">
        <a href="#">
            <i class="fa fa-long-arrow-up"></i>
        </a>
    </div>

    <!-- menu mobie left -->
    {% include 'inc/_menu-left.html' %}

    <!-- menu mobie right -->
    {% include 'inc/_menu-right.html' %}

    <!-- Page Loader -->
    <div id="page-preloader">
        <div class="page-loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
    <!-- Vendor JS -->
    <script src="{% static 'assets/libs/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'assets/libs/popper/popper.min.js' %}"></script>
    <script src="{% static 'assets/libs/bootstrap/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'assets/libs/nivo-slider/js/jquery.nivo.slider.js' %}"></script>
    <script src="{% static 'assets/libs/slider-range/js/tmpl.js' %}"></script>
    <script src="{% static 'assets/libs/slider-range/js/jquery.dependClass-0.1.js' %}"></script>
    <script src="{% static 'assets/libs/slider-range/js/draggable-0.1.js' %}"></script>
    <script src="{% static 'assets/libs/slider-range/js/jquery.slider.js' %}"></script>
    <script src="{% static 'assets/libs/owl-carousel/owl.carousel.min.js' %}"></script>
    <script src="{% static 'assets/libs/slick-slider/js/slick.min.js' %}"></script>

    <!-- Template JS -->
    <script src="{% static 'assets/js/theme.js' %}"></script>
</body>



</html>
